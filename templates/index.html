<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AGC - Advanced Secure Chat</title>
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#0b141a">
    <link rel="stylesheet" href="/static/css/style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.5.1/socket.io.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <script>
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('/service-worker.js')
          .then(reg => console.log('Service Worker Registered', reg))
          .catch(err => console.log('Service Worker Failed', err));
      }
    </script>
</head>
<body>

    <div id="login-modal" class="modal">
        <div class="modal-content">
            <h2>AGC Secure Gateway</h2>
            <p>End-to-End Encryption Enabled</p>
            <div class="fingerprint-icon">🔒</div>
            <input type="text" id="username-input" placeholder="Enter Alias" autocomplete="off">
            <button id="join-btn">Establish Session</button>
        </div>
    </div>

    <div class="app-container" style="display: none;" id="app-container">
        <header class="chat-header">
            <div class="header-info">
                <h1>AGC Session</h1>
                <span class="secure-badge" title="Encrypted Connection">E2EE</span>
            </div>
            <div class="controls">
                <input type="file" id="file-input" style="display: none;">
                <button id="file-btn" class="icon-btn" title="Send File">
                   📎
                </button>
                <button id="video-btn" class="icon-btn" title="Start Video Call">
                   📹
                </button>
            </div>
        </header>

        <!-- Security Banner -->
        <div id="security-banner" class="security-banner">
            <span id="fingerprint-display">Session Fingerprint: Verifying...</span>
        </div>

        <div id="chat-box" class="chat-box"></div>

        <div id="video-area" class="video-area" style="display: none;">
            <div class="video-wrapper">
                <video id="remoteVideo" autoplay playsinline></video>
                <video id="localVideo" autoplay playsinline muted></video>
            </div>
            <button id="hangup-btn" class="danger-btn">End Call</button>
        </div>

        <div class="chat-input-area">
            <input type="text" id="message-input" placeholder="Type a message..." autocomplete="off">
            <button id="send-btn" class="send-btn">➤</button>
        </div>
    </div>

    <script src="/static/js/main.js"></script>
</body>
</html>
